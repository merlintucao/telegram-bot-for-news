services:
  news-bot:
    build:
      context: .
    env_file:
      - .env
    command: ["python", "-m", "news_bot", "run"]
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./${TRUTHSOCIAL_COOKIES_FILE:-truthsocial_cookies.json}:/app/${TRUTHSOCIAL_COOKIES_FILE:-truthsocial_cookies.json}:ro
